[mypy]
python_version = 3.12

# FOCUS: Catch function call errors (like the webhook bug)
# while ignoring style/annotation noise

# Relaxed settings to reduce noise
warn_return_any = False
disallow_untyped_calls = False
disallow_untyped_defs = False
check_untyped_defs = False
ignore_missing_imports = True
implicit_optional = True

# Keep these ON - they catch real bugs
warn_unused_configs = True
show_error_codes = True
pretty = True

# Disable noisy error codes - keep ONLY call-arg (wrong function signatures)
# This catches bugs like passing wrong params to sync_outlook_incremental()
disable_error_code = var-annotated, assignment, attr-defined, dict-item, index, return-value, union-attr, override, return, misc, operator, no-any-return, type-arg, arg-type, call-overload, valid-type

# Exclude tests and venv
exclude = (?x)(
    ^venv/
    | ^\.venv/
    | ^tests/
    | __pycache__
  )

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt

      - name: Run linter (ruff)
        run: uv run ruff check api/ lib/

      - name: Run type checker (mypy)
        run: uv run mypy api/

  validate-openapi:
    name: Validate OpenAPI Schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          uv venv --clear
          uv pip install -r requirements.txt

      # Fake Supabase credentials required because the Supabase SDK client
      # initializes eagerly at module import time (lib/supabase_client.py).
      # The OpenAPI test only reads the schema — it never calls Supabase.
      # The anon key must be a valid JWT structure or the SDK rejects it.
      - name: Validate OpenAPI schema
        run: uv run pytest tests/test_openapi_schema.py -v
        env:
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_ANON_KEY: "eyJhbGciOiAiSFMyNTYiLCAidHlwIjogIkpXVCJ9.eyJyb2xlIjogImFub24iLCAiaXNzIjogInN1cGFiYXNlIn0.placeholder-sig"

name: Migration Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'supabase/migrations/**/*.sql'

jobs:
  check-migrations:
    name: Detect New Migrations
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed migration files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            supabase/migrations/**/*.sql

      - name: Add migrations-pending label
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const labelName = 'migrations-pending';

            // Check if label exists on repo, create if not
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                  color: 'FBCA04',
                  description: 'PR contains database migrations that need to be applied'
                });
              }
            }

            // Add label to PR
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [labelName]
            });

      - name: Comment on PR with migration details
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = '${{ steps.changed-files.outputs.all_changed_files }}'.split(' ').filter(f => f);
            const addedFiles = '${{ steps.changed-files.outputs.added_files }}'.split(' ').filter(f => f);
            const modifiedFiles = '${{ steps.changed-files.outputs.modified_files }}'.split(' ').filter(f => f);

            // Build file list with status indicators
            let fileList = '';
            for (const file of changedFiles) {
              const fileName = file.split('/').pop();
              const status = addedFiles.includes(file) ? '🆕' : '✏️';
              fileList += `- ${status} \`${fileName}\`\n`;
            }

            const body = `## 🗃️ Database Migration Detected

            This PR contains SQL migration files that need to be applied to the database.

            ### Migration Files
            ${fileList}

            ### Pre-merge Checklist
            - [ ] Review migration SQL for correctness
            - [ ] Test migration locally with \`supabase db push --dry-run\`
            - [ ] Apply migration to **staging** (if applicable)
            - [ ] Apply migration to **production** before merging
            - [ ] Verify application works with new schema

            ### Commands
            \`\`\`bash
            # Check migration status
            supabase migration list

            # Dry run against remote
            supabase db push --dry-run

            # Apply migrations
            supabase db push
            \`\`\`

            > ⚠️ **Remember**: Merge this PR only after migrations are applied to production, or coordinate deployment timing to avoid schema mismatches.
            `.split('\n').map(line => line.trim()).join('\n');

            // Check for existing comment to avoid duplicates
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Database Migration Detected')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
